services:
  api:
    build: .
    environment:
      ROLE: api
      REDIS_URL: redis:6379
      MONGO_URL: mongodb://mongo:27017
    ports:
      - "3001:3001"
    depends_on:
      - mongo
      - redis

  worker:
    build: .
    environment:
      ROLE: worker
      REDIS_URL: redis:6379
      MONGO_URL: mongodb://mongo:27017
    depends_on:
      - mongo
      - redis

  scheduler:
    build: .
    environment:
      ROLE: scheduler
      REDIS_URL: redis:6379
      MONGO_URL: mongodb://mongo:27017
    depends_on:
      - mongo
      - redis

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  mongo_data:
  redis_data: